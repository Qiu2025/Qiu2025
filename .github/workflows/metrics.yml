name: Metrics
on:
  # Se ejecuta cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se ejecuta al hacer push en la rama principal
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token guardado en Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración visual
          user: Qiu2025
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # Plugins
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Dónde se guarda el archivo generado
          filename: github-metrics.svg
